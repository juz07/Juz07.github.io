<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tienda Online</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:#0f0f0f;
  color:white;
}

header{
  background:#111827;
  padding:20px;
  text-align:center;
  font-size:28px;
  font-weight:bold;
  color:#00ff99;
  box-shadow:0 0 20px rgba(0,255,150,0.2);
}

.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:#1a1a1a;
  border-radius:20px;
  overflow:hidden;
  transition:0.3s;
  box-shadow:0 0 15px rgba(0,0,0,0.5);
}

.card:hover{
  transform:translateY(-10px);
}

.card img{
  width:100%;
  height:220px;
  object-fit:cover;
}

.info{
  padding:20px;
}

.info h2{
  margin-bottom:10px;
  color:#00ff99;
}

.price{
  font-size:22px;
  margin:10px 0;
}

button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:12px;
  background:#00ff99;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:white;
}

footer{
  text-align:center;
  padding:20px;
  opacity:0.6;
}

</style>
</head>

<body>

<header>
Mi Tienda 🚀
</header>

<div class="container">

<div class="card">

<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=1200&auto=format&fit=crop">

<div class="info">

<h2>Tenis Gamer</h2>

<p>
Diseño moderno y cómodo.
</p>

<div class="price">
$799 MXN
</div>

<button onclick="comprar('Tenis Gamer')">
Comprar
</button>

</div>
</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=1200&auto=format&fit=crop">

<div class="info">

<h2>Reloj Pro</h2>

<p>
Elegante y resistente.
</p>

<div class="price">
$1200 MXN
</div>

<button onclick="comprar('Reloj Pro')">
Comprar
</button>

</div>
</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?q=80&w=1200&auto=format&fit=crop">

<div class="info">

<h2>Audífonos RGB</h2>

<p>
Sonido increíble y luces LED.
</p>

<div class="price">
$950 MXN
</div>

<button onclick="comprar('Audífonos RGB')">
Comprar
</button>

</div>
</div>

</div>

<footer>
Creado desde Android 💻
</footer>

<script>

function comprar(producto){

alert(
"Agregaste " + producto + " al carrito 🛒"
);

}

</script>

</body>
</html>
